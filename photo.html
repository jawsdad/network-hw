<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대회 활동 사진 - 내 소개 페이지</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; color: #333; line-height: 1.6; }
        header { background-color: #2c3e50; color: white; padding: 3rem 2rem; text-align: center; }
        header h1 { margin: 0; font-size: 2.5rem; }
        
        /* 네비게이션 메뉴 */
        nav { background-color: #34495e; display: flex; justify-content: center; padding: 1rem; }
        nav a { color: white; text-decoration: none; margin: 0 2rem; font-size: 1.1rem; font-weight: bold; }
        nav a:hover { color: #3498db; }
        nav a.active { color: #3498db; border-bottom: 2px solid #3498db; padding-bottom: 4px; }

        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        
        /* 오직 사진만 나열하는 갤러리 스타일 */
        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px; /* 사진 사이의 간격 */
            margin-top: 2rem;
        }

        /* 사진 자체에 대한 스타일 */
        .photo-gallery img {
            width: 100%;
            height: 300px;
            object-fit: cover; /* 사진 비율이 깨지지 않게 꽉 채움 */
            border-radius: 8px; /* 모서리를 살짝만 둥글게 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* 밋밋하지 않게 옅은 그림자 추가 */
            transition: transform 0.3s ease;
        }
        
        .photo-gallery img:hover {
            transform: scale(1.03); /* 마우스 올렸을 때 살짝 커지는 효과 */
        }
    </style>
</head>
<body>
    <header>
        <h1>Activity Photos</h1>
    </header>

    <nav>
        <a href="index.html">About Me</a>
        <a href="projects.html">Projects</a>
        <a href="photo.html" class="active">Photos</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <div class="photo-gallery">
            <img src="images/KakaoTalk_20260528_171204611.jpg" alt="자율운항 선박 하드웨어 조립">
            <img src="images/KakaoTalk_20260528_171204611_01.jpg" alt="자율운항 선박 해상 테스트">
            <img src="images/KakaoTalk_20260528_171204611_02.jpg" alt="팀원들과 기념사진">
            <img src="images/KakaoTalk_20260528_171204611_03.jpg" alt="시뮬레이션 회의">
            <img src="images/KakaoTalk_20260528_171204611_04.jpg" alt="ROS 코드 작성">
        </div>
    </div>
</body>
</html>
